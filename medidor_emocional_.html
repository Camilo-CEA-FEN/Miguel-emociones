
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F2F1EF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .page { width: 100%; max-width: 1020px; }

  .header { text-align: center; margin-bottom: 16px; }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: #1A1A1A;
    letter-spacing: -0.5px;
    margin-bottom: 3px;
  }
  .header p {
    font-size: 10px;
    color: #AAA;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .chart-row { display: flex; align-items: stretch; gap: 8px; }

  .y-axis {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
    min-width: 22px;
  }
  .sign {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #555;
    line-height: 1;
  }
  .axis-word {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #555;
  }

  .grid-section { flex: 1; min-width: 0; }

  .q-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    margin-bottom: 4px;
  }
  .q-row.bottom { margin-top: 4px; margin-bottom: 0; }
  .q-badge {
    text-align: center;
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 6px;
    border-radius: 4px;
  }
  .q-r { background: rgba(183,28,28,0.09); color: #B71C1C; }
  .q-y { background: rgba(191,54,12,0.09); color: #BF360C; }
  .q-b { background: rgba(13,71,161,0.09); color: #0D47A1; }
  .q-g { background: rgba(27,94,32,0.09); color: #1B5E20; }

  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5px;
    background: rgba(0,0,0,0.12);
    border-radius: 6px;
    overflow: hidden;
  }

  .cell {
    font-size: 7.5px;
    font-weight: 500;
    text-align: center;
    padding: 5px 2px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    line-height: 1.2;
    user-select: none;
  }
  .cell:hover {
    transform: scale(1.35);
    z-index: 100;
    position: relative;
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    font-size: 10.5px;
    font-weight: 700;
    border-radius: 3px;
  }
  .cell.selected {
    outline: 2.5px solid rgba(255,255,255,0.9);
    outline-offset: -1px;
    transform: scale(1.2);
    z-index: 90;
    position: relative;
    font-weight: 700;
    border-radius: 3px;
  }

  .x-axis {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
  }
  .x-axis .axis-word { writing-mode: initial; transform: none; }

  .selected-bar {
    margin-top: 12px;
    text-align: center;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .selected-pill {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: background 0.2s, color 0.2s;
    background: #E0DED9;
    color: #888;
  }
  .selected-pill.active {
    color: white;
  }
  .hint {
    font-size: 10px;
    color: #BBB;
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Medidor Emocional</h1>
    <p>©2021 Universidad de Yale · Método RULER — Versión extendida · Contexto laboral adulto</p>
  </div>

  <div class="chart-row">
    <div class="y-axis" id="yAxis">
      <span class="sign">+</span>
      <span class="axis-word">Energía</span>
      <span class="sign">−</span>
    </div>
    <div class="grid-section">
      <div class="q-row">
        <div class="q-badge q-r">Alta energía · Incómodo</div>
        <div class="q-badge q-y">Alta energía · Cómodo</div>
      </div>
      <div class="grid" id="emotionGrid"></div>
      <div class="q-row bottom">
        <div class="q-badge q-b">Baja energía · Incómodo</div>
        <div class="q-badge q-g">Baja energía · Cómodo</div>
      </div>
    </div>
  </div>

  <div class="x-axis">
    <span class="sign">−</span>
    <span class="axis-word">Comodidad</span>
    <span class="sign">+</span>
  </div>

  <div class="selected-bar">
    <div class="selected-pill" id="pill">— — —</div>
  </div>
  <div class="hint">Pasa el cursor para ver · Haz clic para seleccionar</div>
</div>

<script>
const emotions = [
  // Fila 0 — energía máxima
  ['Furioso','Frenético','Desesperado','Aterrorizado','Desbordado','Hostil',       'Eufórico','Extasiado','Exaltado','Arrebatado','Apasionado','Radiante'],
  // Fila 1
  ['Indignado','Angustiado','Alarmado','Agitado','Crispado','Impotente',           'Entusiasmado','Empoderado','Decidido','Audaz','Vigoroso','Exuberante'],
  // Fila 2
  ['Irritado','Ansioso','Estresado','Saturado','Tenso','Abrumado',                 'Motivado','Inspirado','Dinámico','Seguro','Optimista','Dichoso'],
  // Fila 3
  ['Fastidiado','Preocupado','Inquieto','Nervioso','Intranquilo','Molesto',         'Animado','Ilusionado','Curioso','Alegre','Festivo','Emocionado'],
  // Fila 4
  ['Receloso','Suspicaz','Aprehensivo','Escéptico','Desconfiado','Cauteloso',       'Interesado','Receptivo','Confiado','Amable','Conectado','Esperanzado'],
  // Fila 5 — cerca del eje horizontal
  ['Incómodo','Alerta','Defensivo','Susceptible','Bloqueado','Irritable',           'Atento','Comprometido','Dispuesto','Activo','Presente','Satisfecho'],
  // Fila 6 — debajo del eje horizontal
  ['Desmotivado','Aburrido','Confundido','Inseguro','Resignado','Tímido',           'Cómodo','Capaz','Tranquilo','Bien','Pensativo','Reflexivo'],
  // Fila 7
  ['Triste','Apático','Decepcionado','Desanimado','Culpable','Avergonzado',         'Acogido','Valorado','Aliviado','Equilibrado','Sereno','Compasivo'],
  // Fila 8
  ['Melancólico','Agotado','Desconectado','Alienado','Incomprendido','Vacío',       'Agradecido','Realizado','Conmovido','Aceptado','Íntegro','Ecuánime'],
  // Fila 9
  ['Abatido','Desesperanzado','Indiferente','Solo','Invisible','Humillado',         'Pleno','Reposado','Armonioso','Calmado','Apacible','Descansado'],
  // Fila 10
  ['Devastado','Miserable','Rechazado','Desolado','Desvalorizado','Derrotado',      'Nutrido','Completo','Repuesto','Querido','Distendido','Compuesto'],
  // Fila 11 — energía mínima
  ['Anulado','Paralizado','Excluido','Abandonado','Quebrado','Hundido',             'Somnoliento','Plácido','Complacido','Adormecido','En paz','Dormitando']
];

const redRows   = ['#B71C1C','#C62828','#D32F2F','#E53935','#EF5350','#FFCDD2'];
const yelRows   = ['#BF360C','#D84315','#E64A19','#F4511E','#FF7043','#FFCCBC'];
const bluRows   = ['#BBDEFB','#64B5F6','#2196F3','#1976D2','#1565C0','#0D47A1'];
const grnRows   = ['#C8E6C9','#81C784','#4CAF50','#388E3C','#2E7D32','#1B5E20'];

const lightBg = new Set(['#FFCDD2','#FFCCBC','#BBDEFB','#64B5F6','#C8E6C9','#81C784']);

const grid = document.getElementById('emotionGrid');
const pill = document.getElementById('pill');
let selectedCell = null;

emotions.forEach((row, ri) => {
  row.forEach((word, ci) => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    let bg;
    if (ri < 6) {
      bg = ci < 6 ? redRows[ri] : yelRows[ri];
    } else {
      const bi = ri - 6;
      bg = ci < 6 ? bluRows[bi] : grnRows[bi];
    }

    const isLight = lightBg.has(bg);
    cell.style.backgroundColor = bg;
    cell.style.color = isLight ? '#1A1A1A' : 'white';
    if (!isLight) cell.style.textShadow = '0 1px 2px rgba(0,0,0,0.22)';
    cell.textContent = word;

    cell.addEventListener('mouseenter', () => {
      pill.textContent = word;
      pill.style.background = bg;
      pill.style.color = isLight ? '#1A1A1A' : 'white';
      pill.classList.add('active');
    });
    cell.addEventListener('mouseleave', () => {
      if (selectedCell) {
        const sc = selectedCell;
        pill.textContent = sc._word;
        pill.style.background = sc._bg;
        pill.style.color = sc._light ? '#1A1A1A' : 'white';
        pill.classList.add('active');
      } else {
        pill.textContent = '— — —';
        pill.style.background = '#E0DED9';
        pill.style.color = '#888';
        pill.classList.remove('active');
      }
    });
    cell.addEventListener('click', () => {
      if (selectedCell) selectedCell.classList.remove('selected');
      if (selectedCell === cell) {
        selectedCell = null;
        pill.textContent = '— — —';
        pill.style.background = '#E0DED9';
        pill.style.color = '#888';
        pill.classList.remove('active');
      } else {
        selectedCell = cell;
        cell._word = word;
        cell._bg = bg;
        cell._light = isLight;
        cell.classList.add('selected');
        pill.textContent = word;
        pill.style.background = bg;
        pill.style.color = isLight ? '#1A1A1A' : 'white';
        pill.classList.add('active');
      }
    });

    grid.appendChild(cell);
  });
});

// Sync y-axis height
const syncHeight = () => {
  const g = document.getElementById('emotionGrid');
  document.getElementById('yAxis').style.height = g.offsetHeight + 'px';
};
setTimeout(syncHeight, 200);
window.addEventListener('resize', syncHeight);
</script>
</body>
</html>
